    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .form-card, .result-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; }

        #materials { min-height: 120px; font-size: 15px; }

            padding: 10px;

            border: 1px solid #eee; 
            flex-wrap: nowrap; /* 절대 줄바꿈 안되게 설정 */
        }
        .check-group label { 
            font-weight: normal; 
            background: white; 
            padding: 10px 5px; 
            border-radius: 5px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 6px; 
            flex: 1; 
            border: 1px solid #ddd; 
            font-size: 14px;
            white-space: nowrap; /* 글자가 아래로 밀리는 현상 방지 */
            min-width: 0; /* flex 박스 내부에서 너비가 유연하게 조절되게 함 */
        }
        .check-group input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }
