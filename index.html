<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>현암초 과학실험 준비물 신청</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .form-card, .result-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; box-sizing: border-box; }
        h1, h3 { color: #2c3e50; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #007bff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #materials { min-height: 120px; font-size: 15px; }
        
        /* 교시 버튼 깨짐 및 밀림 방지 강화 */
        .check-group { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            background: #f8f9fa; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #eee; 
            flex-wrap: wrap; /* 폭이 좁아지면 자연스럽게 아래로 */
        }
        .check-group label { 
            font-weight: normal; 
            background: white; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 6px; 
            border: 1px solid #ddd; 
            font-size: 14px;
            white-space: nowrap; 
            min-width: 85px; /* 버튼이 너무 작아지지 않게 고정 */
            flex: 1;
        }
        .check-group input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }
        
        button.submit-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button.submit-btn:hover { background: #0056b3; }
        button.submit-btn:disabled { background: #ccc; cursor: not-allowed; }
